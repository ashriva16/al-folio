name: Check for broken links

on:
  push:
    branches:
      - myweb
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!_draft/**"
      - "!_notes/**"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - myweb
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!_draft/**"
      - "!_notes/**"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

permissions:
  contents: read

jobs:
  link-checker:
    runs-on: ubuntu-latest
    # only run on the myweb repo
    if: github.repository == 'ashriva16/al-folio'
    steps:
      - uses: actions/checkout@v4

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.17.0

      - name: Link Checker 🔗
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          lychee --version

          lychee \
            --no-progress \
            --verbose \
            --user-agent "curl/7.54" \
            --timeout 20 \
            --max-retries 6 \
            --retry-wait-time 5 \
            --exclude-path _draft \
            --exclude-path _notes \
            --exclude-path README.md \
            --exclude-path _pages/404.md \
            --exclude-path _pages/blog.md \
            --exclude-path _posts/2018-12-22-distill.md \
            --exclude-path _posts/2023-04-24-videos.md \
            --exclude-path _books/the_godfather.md \
            "./**/*.md" "./**/*.html"
