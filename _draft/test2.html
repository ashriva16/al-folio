<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Threads Background Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap + Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f8f9fa;
      }

      .hero-banner {
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      #hero-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      /* Focus nodes (icons) */
      .focus-node {
        position: absolute;
        left: var(--x);
        top: var(--y);
        transform: translate(-50%, -50%);
        z-index: 3;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 22px;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(0, 0, 0, 0.2);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.85);
        color: #0b3a3d;
      }

      .focus-node::after {
        content: attr(data-label);
        position: absolute;
        top: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        font-size: 0.8rem;
        opacity: 0.85;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.06);
      }
    </style>
  </head>
  <body>
    <section class="hero-banner" data-bg="threads">
      <canvas id="hero-canvas"></canvas>

      <!-- Six focus areas -->
      <div class="focus-node" data-label="ML" style="--x: 80%; --y: 20%"><i class="fa-solid fa-brain"></i></div>
      <div class="focus-node" data-label="HPC" style="--x: 85%; --y: 70%"><i class="fa-solid fa-microchip"></i></div>
      <div class="focus-node" data-label="Applied Math" style="--x: 20%; --y: 20%"><i class="fa-solid fa-square-root-variable"></i></div>
      <div class="focus-node" data-label="UQ" style="--x: 15%; --y: 65%"><i class="fa-solid fa-wave-square"></i></div>
      <div class="focus-node" data-label="Programming" style="--x: 50%; --y: 90%"><i class="fa-solid fa-code"></i></div>
      <div class="focus-node" data-label="Optimization" style="--x: 50%; --y: 10%"><i class="fa-solid fa-sliders"></i></div>
    </section>

    <script>
      (function () {
        const section = document.querySelector(".hero-banner");
        const canvas = document.getElementById("hero-canvas");
        if (!section || !canvas) return;

        const ctx = canvas.getContext("2d", { alpha: true });
        const dpr = Math.max(1, window.devicePixelRatio || 1);

        function resize() {
          const w = section.clientWidth;
          const h = section.clientHeight;
          canvas.width = Math.round(w * dpr);
          canvas.height = Math.round(h * dpr);
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        // Threads drawing
        function drawThreads(w, h, t) {
          const nodes = Array.from(section.querySelectorAll(".focus-node"));
          if (!nodes.length) return;
          const cx = w * 0.38,
            cy = h * 0.48;

          const ends = nodes.map((el) => {
            const rect = el.getBoundingClientRect();
            const sec = section.getBoundingClientRect();
            return { x: rect.left - sec.left + rect.width / 2, y: rect.top - sec.top + rect.height / 2 };
          });

          ctx.clearRect(0, 0, w, h);

          ends.forEach((p, i) => {
            const dx = p.x - cx,
              dy = p.y - cy,
              L = Math.hypot(dx, dy) || 1;
            const ux = dx / L,
              uy = dy / L;
            const k1 = 0.35,
              k2 = 0.75;
            const c1x = cx + ux * L * k1 + -uy * 40,
              c1y = cy + uy * L * k1 + ux * 40;
            const c2x = cx + ux * L * k2 + uy * 20,
              c2y = cy + uy * L * k2 + -ux * 20;

            ctx.strokeStyle = "rgba(0,150,200,0.25)";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.bezierCurveTo(c1x, c1y, c2x, c2y, p.x, p.y);
            ctx.stroke();

            ctx.setLineDash([120, 260]);
            ctx.lineDashOffset = -(t * 0.12 + i * 40);
            ctx.strokeStyle = "rgba(0,150,200,1)";
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.bezierCurveTo(c1x, c1y, c2x, c2y, p.x, p.y);
            ctx.stroke();
            ctx.setLineDash([]);
          });

          ctx.fillStyle = "black";
          ctx.beginPath();
          ctx.arc(cx, cy, 4, 0, Math.PI * 2);
          ctx.fill();
        }

        function animate() {
          const w = section.clientWidth,
            h = section.clientHeight;
          const t = performance.now();
          drawThreads(w, h, t);
          requestAnimationFrame(animate);
        }

        resize();
        animate();
        window.addEventListener("resize", resize);
      })();
    </script>
  </body>
</html>
